name: pleasant
services:
  db:
    image: postgres:18
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pleasant-db
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql

volumes:
  db-data: 
